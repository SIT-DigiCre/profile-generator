<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>デジクリ部員図鑑ジェネレーター</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&family=M+PLUS+1:wght@100..900&family=M+PLUS+1p:wght@700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script type="importmap">
      {
        "imports": {
          "@material/web/": "https://esm.run/@material/web/"
        }
      }
    </script>
    <script type="module">
      import '@material/web/textfield/outlined-text-field.js';
      import '@material/web/slider/slider.js';
      import '@material/web/divider/divider.js';
    </script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    
    <style>
        :root {
            --primary-blue: #00B0F0;
            --md-sys-color-primary: #00B0F0; 
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #1e1e1e;
            color: #333;
        }

        .preview-wrapper {
            flex: 1;
            /* Flexboxによる中央寄せを廃止し、相対配置の基準値にする */
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }
        
        .export-canvas {
            width: 1920px;
            height: 1080px;
            background-color: white;
            background-image: url('background.png'); /* ◀ ご自身の環境に合わせてファイル名を調整してください */
            background-size: cover;
            background-position: center;
            
            /* 【変更】Flexboxの影響を受けない絶対配置に */
            position: absolute;
            transform-origin: 0 0; /* 左上を基準に縮小する */
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            
            /* 【変更】計算が終わるまで非表示にしてチラつきを防ぐ */
            opacity: 0;
            transition: opacity 0.3s ease; 
        }

        .controls {
            width: 450px; 
            background-color: #ffffff;
            padding: 30px 24px;
            box-sizing: border-box;
            overflow-y: auto;
            border-left: 1px solid #e0e0e0;
            z-index: 10;
            box-shadow: -4px 0 8px rgba(0,0,0,0.05);
        }
        
        .controls h2 { 
            margin-top: 0; 
            font-size: 1.1rem; 
            color: #1f1f1f; 
            font-family: 'Roboto', sans-serif;
            font-weight: 500;
        }

        .btn-simple {
            background-color: #00B0F0;
            color: white;
            border: none;
            border-radius: 4px; 
            padding: 10px 16px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            font-family: inherit;
        }
        .btn-simple:hover { opacity: 0.8; }
        
        .btn-export {
            width: 100%;
            height: 56px;
            font-size: 1.1rem;
        }

        /* ----- ここから下は座標設定 (変更なし) ----- */
        .m-plus-1p-bold { font-family: "M PLUS 1p", sans-serif; font-weight: 700; font-style: normal; }
        .m-plus-1p-extrabold { font-family: "M PLUS 1p", sans-serif; font-weight: 800; font-style: normal; }
        .overlay { position: absolute; z-index: 2; }
        
        #preview-icon { top: 111px; left: 96px; width: 192px; height: 192px; border-radius: 50%; object-fit: cover; background-color: transparent; }
        #preview-grade { top: 30px; left: 796px; font-size: 34px; font-weight: 900; color: white; letter-spacing: 2px; font-family: "M PLUS 1p", sans-serif; font-weight: 700; }
        #preview-name { top: 172px; left: 345px; font-size: 72px; font-weight: 900; color: black; white-space: nowrap; font-family: "M PLUS 1p", sans-serif; font-weight: 800; }
        #preview-dept { top: 486px; left: 144px; font-size: 36px; font-weight: bold; color: black; transition: font-size 0.3s ease; font-family: "M PLUS 1p", sans-serif; font-weight: 700; }
        .percent-text-white { font-size: 46px; font-weight: 900; color: white; text-align: center; width: 140px; font-family: "M PLUS 1p", sans-serif; font-weight: 700; }
        .percent-text-digicre-skyblue { font-size: 77px; font-weight: 900; color: black; text-align: center; width: 140px; font-family: "M PLUS 1p", sans-serif; font-weight: 700; }

        #preview-discord { top: 145px; left: 1035px; }
        #preview-mattermost { top: 145px; left: 1504px; }
        #preview-pg { top: 620px; left: 122px; }
        #preview-dtm { top: 770px; left: 122px; }
        #preview-3dcg { top: 922px; left: 122px; }
        #preview-illust { top: 620px; left: 400px; }
        #preview-movie { top: 770px; left: 400px; }
        #preview-word { top: 922px; left: 400px; }
        #preview-vtuber { top: 620px; left: 679px; }
        #preview-sysdev { top: 770px; left: 679px; }
        #preview-design { top: 922px; left: 679px; }

        #preview-memo { top: 410px; left: 1020px; width: 900px; height: 620px; font-size: 32px; line-height: 1.5; color: #333; overflow: hidden; word-wrap: break-word; }
        #preview-memo h1, #preview-memo h2, #preview-memo h3 { margin-top: 0; color: #00B0F0; margin-bottom: 5px; }
        #preview-memo p { margin-top: 0; margin-bottom: 8px; }
        #preview-memo ul { padding-left: 30px; margin-top: 0; margin-bottom: 8px;}
    </style>
</head>
<body>

    <div class="preview-wrapper" id="preview-wrapper">
        <div class="export-canvas" id="export-target">
            <img id="preview-icon" class="overlay" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=">
            <div id="preview-grade" class="overlay">23rd</div>
            <div id="preview-name" class="overlay">デジペン</div>
            <div id="preview-dept" class="overlay">工学部 情報・通信工学課程 情報通信コース</div>
            
            <div id="preview-discord" class="overlay percent-text-digicre-skyblue">50</div>
            <div id="preview-mattermost" class="overlay percent-text-digicre-skyblue">50</div>
            
            <div id="preview-pg" class="overlay percent-text-white">50</div>
            <div id="preview-illust" class="overlay percent-text-white">50</div>
            <div id="preview-vtuber" class="overlay percent-text-white">50</div>
            
            <div id="preview-dtm" class="overlay percent-text-white">50</div>
            <div id="preview-movie" class="overlay percent-text-white">50</div>
            <div id="preview-sysdev" class="overlay percent-text-white">50</div>
            
            <div id="preview-3dcg" class="overlay percent-text-white">50</div>
            <div id="preview-word" class="overlay percent-text-white">50</div>
            <div id="preview-design" class="overlay percent-text-white">50</div>

            <div id="preview-memo" class="overlay"></div>
        </div>
    </div>

    <div class="controls">
        <h2 style="margin-bottom: 20px;">プロフィール情報</h2>
        
        <md-outlined-text-field label="GRADE (期)" id="input-grade" value="23rd" oninput="updateText('grade')" style="width: 100%; margin-bottom: 16px;"></md-outlined-text-field>
        
        <div style="margin-bottom: 16px; display: flex; align-items: center; gap: 12px;">
            <input type="file" id="input-icon" accept="image/*" onchange="updateIcon(event)" style="display: none;">
            <button class="btn-simple" onclick="document.getElementById('input-icon').click()">アイコンを選択</button>
            <span id="file-name-display" style="font-size: 0.85rem; color: #666; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">選択されていません</span>
        </div>

        <md-outlined-text-field label="NAME" id="input-name" value="デジペン" oninput="updateText('name')" style="width: 100%; margin-bottom: 16px;"></md-outlined-text-field>
        
        <md-outlined-text-field label="所属学科" id="input-dept" value="工学部 情報・通信工学課程 情報通信コース" oninput="updateText('dept')" style="width: 100%; margin-bottom: 24px;"></md-outlined-text-field>

        <md-divider style="margin-bottom: 24px;"></md-divider>
        <h2 style="margin-bottom: 20px;">出没度・興味ある度</h2>
        
        <div id="sliders-container"></div>

        <md-divider style="margin-top: 8px; margin-bottom: 24px;"></md-divider>
        <h2 style="margin-bottom: 20px;">MEMO (Markdown対応)</h2>
        
        <md-outlined-text-field type="textarea" label="MEMO" id="input-memo" rows="6" oninput="updateMemo()" style="width: 100%; margin-bottom: 32px; resize: vertical;" value="## ここは自由記述欄です&#10;Markdownが利用できます！&#10;&#10;## たとえば&#10;「## 」を書くと見出しになります"></md-outlined-text-field>

        <button class="btn-simple btn-export" onclick="exportImage()">画像として保存</button>
    </div>

    <script>
        const sliders = [
            { id: 'discord', label: 'Discord 出没度' },
            { id: 'mattermost', label: 'Mattermost 出没度' },
            { id: 'pg', label: 'PG 興味ある度' },
            { id: 'illust', label: 'イラスト 興味ある度' },
            { id: 'vtuber', label: 'VTuber 興味ある度' },
            { id: 'dtm', label: 'DTM 興味ある度' },
            { id: 'movie', label: 'Movie 興味ある度' },
            { id: 'sysdev', label: 'SysDev 興味ある度' },
            { id: '3dcg', label: '3DCG 興味ある度' },
            { id: 'word', label: '文字書き 興味ある度' },
            { id: 'design', label: 'デザイン 興味ある度' }
        ];

        const slidersContainer = document.getElementById('sliders-container');
        sliders.forEach(s => {
            const div = document.createElement('div');
            div.style.marginBottom = '20px';
            div.innerHTML = `
                <div style="display: flex; justify-content: space-between; margin-bottom: 4px; padding: 0 4px;">
                    <label style="font-size: 0.9rem; color: #444; font-weight: 500;">${s.label}</label>
                    <span id="val-${s.id}" style="font-size: 0.9rem; font-weight: bold; color: var(--primary-blue);">50%</span>
                </div>
                <md-slider min="0" max="100" value="50" id="input-${s.id}" oninput="updateSlider('${s.id}')" style="width: 100%;"></md-slider>
            `;
            slidersContainer.appendChild(div);
        });

        function updateText(id) {
            document.getElementById(`preview-${id}`).innerText = document.getElementById(`input-${id}`).value;
            if (id === 'dept') {
                adjustDeptFontSize();
            }
        }

        function adjustDeptFontSize() {
            const deptElement = document.getElementById('preview-dept');
            const textLength = deptElement.innerText.length;
            
            let fontSize;
            if (textLength <= 21) fontSize = '36px';
            else if (textLength <= 23) fontSize = '32px';
            else if (textLength <= 25) fontSize = '29px';
            else fontSize = '21px';
            
            deptElement.style.fontSize = fontSize;
        }

        function updateSlider(id) {
            const val = document.getElementById(`input-${id}`).value;
            const displayVal = val + '%';
            document.getElementById(`val-${id}`).innerText = displayVal;
            document.getElementById(`preview-${id}`).innerText = val;
        }

        function updateIcon(event) {
            const file = event.target.files[0];
            if (file) {
                document.getElementById('file-name-display').innerText = file.name;
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('preview-icon');
                    img.src = e.target.result;
                    img.style.backgroundColor = 'white';
                }
                reader.readAsDataURL(file);
            }
        }

        function updateMemo() {
            const rawText = document.getElementById('input-memo').value;
            document.getElementById('preview-memo').innerHTML = marked.parse(rawText);
        }

        // 【変更】座標を計算して絶対にど真ん中に配置するロジック
        function resizeCanvas() {
            const wrapper = document.getElementById('preview-wrapper');
            const canvas = document.getElementById('export-target');
            if (!wrapper || !canvas) return;

            // 余白を両サイド20px(計40px)確保
            const availableWidth = wrapper.clientWidth - 40;
            const availableHeight = wrapper.clientHeight - 40;

            // 1920x1080に対する縮小率を計算
            const scale = Math.min(availableWidth / 1920, availableHeight / 1080);
            
            // 縮小された状態の幅と高さを計算
            const scaledWidth = 1920 * scale;
            const scaledHeight = 1080 * scale;
            
            // 残った空間の半分を left, top に設定することで完全に中央寄せ
            const left = (wrapper.clientWidth - scaledWidth) / 2;
            const top = (wrapper.clientHeight - scaledHeight) / 2;

            canvas.style.transform = `scale(${scale})`;
            canvas.style.left = `${left}px`;
            canvas.style.top = `${top}px`;
            
            // 計算が終わったらフワッと表示する
            if (canvas.style.opacity !== '1') {
                canvas.style.opacity = '1';
            }
        }

        // 【変更】画面サイズの変動を直接監視（マテリアルUIの遅延描画にも対応）
        const resizeObserver = new ResizeObserver(() => {
            requestAnimationFrame(() => {
                resizeCanvas();
            });
        });
        resizeObserver.observe(document.getElementById('preview-wrapper'));

        // 初期化
        updateMemo();
        adjustDeptFontSize();
        resizeCanvas();

        function exportImage() {
            const target = document.getElementById('export-target');
            
            html2canvas(target, {
                scale: 1,
                width: 1920,
                height: 1080,
                useCORS: true,
                backgroundColor: '#ffffff',
                onclone: (clonedDoc) => {
                    const clonedTarget = clonedDoc.getElementById('export-target');
                    
                    // キャプチャ時だけズームを解除し、座標を左上に戻す
                    clonedTarget.style.transform = 'none';
                    clonedTarget.style.left = '0px';
                    clonedTarget.style.top = '0px';
                    clonedTarget.style.boxShadow = 'none';
                    clonedTarget.style.opacity = '1';
                }
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'profile_card.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => {
                console.error("Export failed:", err);
                alert("画像のエクスポートに失敗しました。");
            });
        }
    </script>
</body>
</html>
